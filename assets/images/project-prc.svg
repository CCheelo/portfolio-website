<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <defs>
    <linearGradient id="pitch-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>

  <!-- Pitch background -->
  <rect width="500" height="200" fill="url(#pitch-grad)"/>

  <!-- Pitch stripes (subtle) -->
  <rect x="0"   y="0" width="50"  height="200" fill="#166534" opacity="0.4"/>
  <rect x="100" y="0" width="50"  height="200" fill="#166534" opacity="0.4"/>
  <rect x="200" y="0" width="50"  height="200" fill="#166534" opacity="0.4"/>
  <rect x="300" y="0" width="50"  height="200" fill="#166534" opacity="0.4"/>
  <rect x="400" y="0" width="50"  height="200" fill="#166534" opacity="0.4"/>

  <!-- Outer boundary -->
  <rect x="20" y="15" width="460" height="170" rx="4" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>

  <!-- Halfway line -->
  <line x1="250" y1="15" x2="250" y2="185" stroke="white" stroke-width="1.5" opacity="0.8"/>

  <!-- Centre circle -->
  <circle cx="250" cy="100" r="35" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <circle cx="250" cy="100" r="3" fill="white" opacity="0.9"/>

  <!-- Left penalty area -->
  <rect x="20" y="58" width="75" height="84" rx="2" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <!-- Left goal area -->
  <rect x="20" y="76" width="35" height="48" rx="2" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <!-- Left penalty spot -->
  <circle cx="72" cy="100" r="2.5" fill="white" opacity="0.8"/>

  <!-- Right penalty area -->
  <rect x="405" y="58" width="75" height="84" rx="2" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <!-- Right goal area -->
  <rect x="445" y="76" width="35" height="48" rx="2" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <!-- Right penalty spot -->
  <circle cx="428" cy="100" r="2.5" fill="white" opacity="0.8"/>

  <!-- Players (orange dots with shadows) -->
  <!-- Team A (left side) -->
  <circle cx="60"  cy="100" r="7" fill="#c2410c" stroke="white" stroke-width="1.5"/>
  <circle cx="130" cy="65"  r="7" fill="#c2410c" stroke="white" stroke-width="1.5"/>
  <circle cx="130" cy="135" r="7" fill="#c2410c" stroke="white" stroke-width="1.5"/>
  <circle cx="180" cy="100" r="7" fill="#c2410c" stroke="white" stroke-width="1.5"/>
  <circle cx="160" cy="80"  r="7" fill="#c2410c" stroke="white" stroke-width="1.5"/>

  <!-- Team B (right side) -->
  <circle cx="440" cy="100" r="7" fill="#1e40af" stroke="white" stroke-width="1.5"/>
  <circle cx="370" cy="65"  r="7" fill="#1e40af" stroke="white" stroke-width="1.5"/>
  <circle cx="370" cy="135" r="7" fill="#1e40af" stroke="white" stroke-width="1.5"/>
  <circle cx="320" cy="100" r="7" fill="#1e40af" stroke="white" stroke-width="1.5"/>
  <circle cx="340" cy="80"  r="7" fill="#1e40af" stroke="white" stroke-width="1.5"/>

  <!-- Ball -->
  <circle cx="250" cy="100" r="6" fill="white" stroke="#d1d5db" stroke-width="0.5"/>

  <!-- PRC branding overlay (top right) -->
  <rect x="340" y="20" width="130" height="36" rx="6" fill="#000000" opacity="0.45"/>
  <text x="405" y="35" font-family="system-ui, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="700" opacity="0.95">PRC System</text>
  <text x="405" y="49" font-family="system-ui, sans-serif" font-size="8"  fill="#d1d5db" text-anchor="middle" opacity="0.85">Player Registry Centre</text>
</svg>
